services:
  app:
    image: nazmulhasn/iumi_app:latest
    container_name: iumi_app
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=mongodb+srv://car-doctor:car-doctor@cluster0.pyj8wdj.mongodb.net/iumi_app?retryWrites=true&w=majority
      - REDIS_HOST=iumi_app_redis
      - REDIS_PORT=6379
    expose:
      - '5000'
      - '5005'
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    container_name: iumi_nginx    
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      -  /var/www/app:/var/www/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app

  frontend:
    build: .
    image: nazmulhasn/ibadi_dashboard:latest
    container_name: ibadi_dashboard
    restart: unless-stopped
    environment:
      - PORT=3005
      - NEXT_PUBLIC_BASE_URL=https://api.iumi.ro/api/v1
      - NEXT_PUBLIC_SOCKET_URL=https://socket.iumi.ro
    expose:
      - "3005"
    depends_on:
      - app


  redis:
    image: redis:7.2-alpine
    container_name: iumi_app_redis
    restart: always
    volumes:
      - redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']

  certbot:
    image: certbot/certbot
    container_name: iumi_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  redis-data: